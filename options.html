<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessibility
        Toolbar
        Settings</title>
    <style>
        /* Google Settings Canvas */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f1f3f4;
            color: #202124;
            display: flex;
            justify-content: center;
            padding-top: 60px;
            margin: 0;
        }

        /* Elevated Content Card */
        .card {
            background: #ffffff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            font-weight: 400;
            font-size: 22px;
            color: #202124;
            margin-bottom: 28px;
        }

        .setting-group {
            margin-bottom: 24px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #3c4043;
        }

        /* Material Inputs with Blue Focus Ring */
        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            box-sizing: border-box;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            color: #202124;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border: 2px solid #1a73e8;
            padding: 11px 15px; /* Adjust padding to prevent jumping when border expands */
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #1a73e8; /* Makes the slider track Google Blue */
        }

        .help-text {
            display: block;
            font-size: 12px;
            color: #5f6368;
            margin-top: 6px;
        }

        .help-text a {
            color: #1a73e8;
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        /* Primary Save Button */
        button {
            padding: 10px 24px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            float: right;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        button:hover {
            background-color: #1b66c9;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 2px 6px 2px rgba(60, 64, 67, 0.15);
        }

        #status {
            clear: both;
            color: #1e8e3e; /* Google Success Green */
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            text-align: right;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>⚙️ Settings</h2>

    <div class="setting-group">
        <label for="apiKey">Gemini
            API
            Key</label>
        <input type="text"
               id="apiKey"
               placeholder="AIzaSy...">
        <span class="help-text">Get your free key at <a
                href="https://aistudio.google.com"
                target="_blank">Google AI Studio</a>.</span>
    </div>

    <div class="setting-group">
        <label for="voiceSelect">Text-to-Speech
            Voice</label>
        <select id="voiceSelect">
            <option value="">
                Default
                System
                Voice
            </option>
        </select>
    </div>

    <div class="setting-group">
        <label for="speechRate">Reading
            Speed: <span
                    id="rateValue">0.9</span>x</label>
        <input type="range"
               id="speechRate"
               min="0.5"
               max="2.0"
               step="0.1"
               value="0.9">
    </div>

    <div>
        <button id="saveBtn">
            Save
        </button>
        <div id="status"></div>
    </div>
</div>

<script src="options.js"></script>
</body>
</html>
